<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Study Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Study<span>AI</span></div>
    <div class="auth-subtitle">Your AI-powered study companion</div>
    <div class="auth-error" id="auth-error"></div>
    <h2 id="auth-title" style="font-size:20px;margin-bottom:20px">Welcome back</h2>
    <div class="auth-form" id="auth-card-body"></div>
  </div>
</div>

<div id="app-screen" class="app hidden">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">&#10022;</div>
      <div class="logo-text">Study<span>AI</span></div>
    </div>

    <span class="nav-label">Dashboard</span>
    <div class="nav-item active" data-section="home" onclick="switchSection('home')">
      <span class="nav-icon">&#127968;</span> Home
    </div>

    <span class="nav-label">Workspace</span>
    <div class="nav-item" data-section="files" onclick="switchSection('files')">
      <span class="nav-icon">&#128193;</span> Files
      <span class="nav-badge" id="badge-files">0</span>
    </div>
    <div class="nav-item" data-section="chat" onclick="switchSection('chat')">
      <span class="nav-icon">&#128172;</span> Chat
    </div>

    <span class="nav-label">Generate</span>
    <div class="nav-item" data-section="output" onclick="switchSection('output')">
      <span class="nav-icon">&#128196;</span> Output
    </div>
    <div class="nav-item" data-section="cornell" onclick="switchSection('cornell')">
      <span class="nav-icon">&#128221;</span> Cornell Notes
    </div>
    <div class="nav-item" data-section="calendar" onclick="switchSection('calendar')">
      <span class="nav-icon">&#128197;</span> Study Calendar
    </div>
    <div class="nav-item" data-section="playground" onclick="switchSection('playground')">
      <span class="nav-icon">&#9889;</span> Playground
    </div>

    <div class="sidebar-footer">
      <div id="sidebar-user-area"></div>
      <div style="margin-top:8px">
        <span class="status-dot"></span>
        <span class="status-text">Connected</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Home</span>
      <span class="topbar-sub" id="topbar-sub">Your study dashboard</span>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content-root"></div>
  </main>
</div>

<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
