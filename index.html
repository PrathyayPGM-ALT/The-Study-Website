<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Study Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="auth-screen" class="auth-screen">
  <!-- Left: form panel -->
  <div class="auth-left">
    <div class="auth-content">
      <div class="auth-logo">The Study <span>Website</span></div>
      <h2 class="auth-welcome" id="auth-title">Welcome back</h2>
      <p class="auth-welcome-sub">Sign in to your account</p>
      <div class="auth-error" id="auth-error"></div>
      <div class="auth-form" id="auth-card-body"></div>
    </div>
  </div>
  <!-- Right: testimonial panel -->
  <div class="auth-right">
    <div class="auth-testimonial">
      <div class="auth-quote-mark">&#8220;</div>
      <p class="auth-quote-text" id="quote-text">I use it everytime for my exams!</p>
      <div class="auth-quote-author">
        <div class="auth-quote-avatar" id="quote-avatar">SR</div>
        <span class="auth-quote-name" id="quote-name">Srikrish Raman</span>
      </div>
    </div>
  </div>
</div>

<div id="app-screen" class="app hidden">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">&#10022;</div>
      <div class="logo-text" style="font-size:13px">The Study <span>Website</span></div>
    </div>

    <span class="nav-label">Dashboard</span>
    <div class="nav-item active" data-section="home" onclick="switchSection('home')">
      <span class="nav-icon">&#127968;</span> Home
    </div>

    <span class="nav-label">Workspace</span>
    <div class="nav-item" data-section="files" onclick="switchSection('files')">
      <span class="nav-icon">&#128193;</span> Files
      <span class="nav-badge" id="badge-files">0</span>
    </div>
    <div class="nav-item" data-section="chat" onclick="switchSection('chat')">
      <span class="nav-icon">&#128172;</span> Chat
    </div>

    <span class="nav-label">Generate</span>
    <div class="nav-item" data-section="output" onclick="switchSection('output')">
      <span class="nav-icon">&#128196;</span> Output
    </div>
    <div class="nav-item" data-section="cornell" onclick="switchSection('cornell')">
      <span class="nav-icon">&#128221;</span> Cornell Notes
    </div>
    <div class="nav-item" data-section="calendar" onclick="switchSection('calendar')">
      <span class="nav-icon">&#128197;</span> Study Calendar
    </div>
    <div class="nav-item" data-section="playground" onclick="switchSection('playground')">
      <span class="nav-icon">&#9889;</span> Playground
    </div>

    <div class="sidebar-footer">
      <div id="sidebar-user-area"></div>
      <div style="margin-top:8px">
        <span class="status-dot"></span>
        <span class="status-text">Connected</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Home</span>
      <span class="topbar-sub" id="topbar-sub">Your study dashboard</span>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content-root"></div>
  </main>
</div>

<div id="toast-container"></div>

<script src="app.js"></script>
<script>
  const _testimonials = [
    { text: "I use it everytime for my exams!", name: "Srikrish Raman", initials: "SR" },
    { text: "Cool", name: "Veer Dalal", initials: "VD" },
    { text: "You should use this — it's awesome!", name: "My mom", initials: "MM" }
  ];
  let _tIdx = 0;
  function _cycleTestimonial() {
    _tIdx = (_tIdx + 1) % _testimonials.length;
    const t = _testimonials[_tIdx];
    const qt = document.getElementById('quote-text');
    const qa = document.getElementById('quote-avatar');
    const qn = document.getElementById('quote-name');
    if (!qt) return;
    qt.style.opacity = '0';
    setTimeout(() => {
      qt.textContent = t.text;
      qa.textContent = t.initials;
      qn.textContent = t.name;
      qt.style.opacity = '1';
    }, 350);
  }
  setInterval(_cycleTestimonial, 5000);
</script>
</body>
</html>
